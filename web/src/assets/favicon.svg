<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rho Aias - 炽天覆七重圆环 -->
  <!-- Fate风格：樱花色花瓣屏障，带有魔法结界感 -->
  
  <defs>
    <!-- 樱花渐变 -->
    <linearGradient id="petalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB7C5"/>
      <stop offset="50%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#C44569"/>
    </linearGradient>
    
    <!-- 外发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 内发光 -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外层光环 - 结界边缘 -->
  <circle cx="160" cy="160" r="140" stroke="#FF6B9D" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#glow)"/>
  <circle cx="160" cy="160" r="130" stroke="#FFB7C5" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- 七片花瓣屏障 - 樱花色 -->
  <g filter="url(#glow)">
    <!-- 花瓣 1 - 上 -->
    <path d="M160 15 Q200 40, 188 95 Q175 145, 160 160 Q145 145, 132 95 Q120 40, 160 15Z" 
          fill="url(#petalGrad1)" opacity="0.95"/>
    <path d="M160 25 Q192 45, 182 90 Q170 130, 160 145 Q150 130, 138 90 Q128 45, 160 25Z" 
          fill="#FFE4E9" opacity="0.5"/>
    
    <!-- 花瓣 2 - 右上 -->
    <path d="M235 40 Q275 80, 252 135 Q225 175, 208 168 Q200 158, 225 125 Q258 82, 235 40Z" 
          fill="url(#petalGrad1)" opacity="0.88"/>
    <path d="M230 55 Q258 88, 242 128 Q220 160, 210 155 Q205 148, 225 120 Q250 85, 230 55Z" 
          fill="#FFE4E9" opacity="0.45"/>
    
    <!-- 花瓣 3 - 右 -->
    <path d="M288 115 Q300 170, 260 212 Q220 245, 205 232 Q198 220, 228 195 Q268 160, 288 115Z" 
          fill="url(#petalGrad1)" opacity="0.8"/>
    <path d="M278 125 Q285 168, 252 202 Q218 230, 208 222 Q205 212, 232 190 Q265 162, 278 125Z" 
          fill="#FFE4E9" opacity="0.4"/>
    
    <!-- 花瓣 4 - 右下 -->
    <path d="M298 198 Q285 252, 235 272 Q190 288, 178 272 Q175 260, 210 250 Q262 235, 298 198Z" 
          fill="url(#petalGrad1)" opacity="0.72"/>
    <path d="M285 208 Q275 250, 235 265 Q198 278, 188 268 Q188 258, 218 250 Q262 238, 285 208Z" 
          fill="#FFE4E9" opacity="0.35"/>
    
    <!-- 花瓣 5 - 左下 -->
    <path d="M242 280 Q195 310, 140 295 Q95 282, 95 265 Q98 255, 140 262 Q200 272, 242 280Z" 
          fill="url(#petalGrad1)" opacity="0.65"/>
    <path d="M228 282 Q188 305, 145 295 Q110 285, 112 272 Q118 265, 150 270 Q200 278, 228 282Z" 
          fill="#FFE4E9" opacity="0.3"/>
    
    <!-- 花瓣 6 - 左 -->
    <path d="M128 305 Q72 295, 45 245 Q25 200, 42 188 Q52 182, 82 215 Q125 262, 128 305Z" 
          fill="url(#petalGrad1)" opacity="0.58"/>
    <path d="M118 295 Q72 285, 52 242 Q38 205, 52 198 Q62 195, 88 225 Q125 265, 118 295Z" 
          fill="#FFE4E9" opacity="0.28"/>
    
    <!-- 花瓣 7 - 左上 -->
    <path d="M42 195 Q18 140, 52 82 Q78 42, 98 48 Q108 58, 88 100 Q58 158, 42 195Z" 
          fill="url(#petalGrad1)" opacity="0.52"/>
    <path d="M52 188 Q35 142, 62 95 Q82 62, 98 68 Q105 78, 88 112 Q62 160, 52 188Z" 
          fill="#FFE4E9" opacity="0.25"/>
  </g>
  
  <!-- 中心能量核心 -->
  <circle cx="160" cy="160" r="48" stroke="#FF6B9D" stroke-width="3" fill="none" filter="url(#innerGlow)"/>
  <circle cx="160" cy="160" r="38" stroke="#FFB7C5" stroke-width="2" fill="none" opacity="0.8"/>
  <circle cx="160" cy="160" r="28" fill="#FFE4E9" opacity="0.9"/>
  <circle cx="160" cy="160" r="18" fill="#FF6B9D" opacity="0.85"/>
  <circle cx="160" cy="160" r="8" fill="#FFFFFF"/>
  
  <!-- 能量线条 -->
  <g stroke="#FFB7C5" stroke-width="1" opacity="0.6">
    <line x1="160" y1="112" x2="160" y2="80"/>
    <line x1="196" y1="124" x2="218" y2="98"/>
    <line x1="208" y1="160" x2="240" y2="160"/>
    <line x1="196" y1="196" x2="218" y2="222"/>
    <line x1="124" y1="196" x2="102" y2="222"/>
    <line x1="112" y1="160" x2="80" y2="160"/>
    <line x1="124" y1="124" x2="102" y2="98"/>
  </g>
</svg>
