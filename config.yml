server:
  port: 8081

# 日志配置
log:
  level: info           # 日志级别: debug/info/warn/error
  format: console       # 输出格式: console/json
  output_dir: ./logs    # 日志目录
  max_age_days: 30      # 日志保留天数
  rotation_hours: 1     # 按小时分割

ebpf:
  interface_name: ens33
intel:
  enabled: true
  auto_refresh_on_start: true  # 启动时自动刷新
  persistence_dir: ./data/intel
  batch_size: 1000
  sources:
    ipsum:
      enabled: true
      periodic: true               # 是否开启周期性更新（默认 true，设为 false 则仅启动时下载）
      schedule: "0 1 * * *"  #  每天凌晨 1 点更新
      # url: https://raw.githubusercontent.com/stamparm/ipsum/master/ipsum.txt
      # url: https://raw.gitcode.com/gh_mirrors/ip/ipsum/raw/master/ipsum.txt
      url: http://localhost/ipsum.txt
      format: ipsum
    spamhaus:
      enabled: true
      periodic: true               # 是否开启周期性更新（默认 true，设为 false 则仅启动时下载）
      schedule: "0 2 * * *"  # 每天凌晨 2 点更新
      # url: https://www.spamhaus.org/drop/drop.txt
      url: http://localhost/drop.txt
      format: spamhaus
geo_blocking:
  enabled: true
  auto_refresh_on_start: true  # 启动时自动刷新
  mode: whitelist  # whitelist 或 blacklist
  allowed_countries:
    - CN  # 中国
  allow_private_networks: true  # 允许私有网段绕过地域检查
  persistence_dir: ./data/geo
  batch_size: 1000
  sources:
    maxmind:
      enabled: true
      periodic: true               # 是否开启周期性更新（默认 true，设为 false 则仅启动时下载）
      schedule: "0 3 * * *"  # 每天凌晨 3 点更新
      # url: https://github.com/P3TERX/GeoLite.mmdb/releases/download/2026.01.10/GeoLite2-Country.mmdb
      url: http://localhost/GeoLite2-Country.mmdb  # MMDB 文件 URL
      format: maxmind-db  # 使用 MMDB 二进制格式
manual:
  enabled: true          # 启用手动规则持久化
  persistence_dir: ./data/manual  # 持久化目录
  auto_load: true        # 启动时自动加载

# 认证配置
auth:
  enabled: false                    # 是否启用认证
  jwt_secret: ""                   # JWT 密钥，建议从环境变量 JWT_SECRET 读取，留空则使用环境变量
  jwt_issuer: "rho-aias"           # JWT 签发者
  token_duration: 1440             # Token 有效期（分钟），默认 1440 分钟（24小时）
  database_path: "./data/auth.db"  # 数据库路径
  captcha_enabled: true            # 是否启用验证码
  captcha_duration: 5              # 验证码有效期（分钟）

  # 预定义的 API Key（可选）
  # 留空数组则不创建任何 API Key
  # 建议在生产环境中通过环境变量传入密钥，如：${MASTER_API_KEY}
  api_keys:
    # 示例：超级管理员 API Key（拥有全部权限）
    # - name: "Master Admin Key"
    #   key: "${MASTER_API_KEY}"  # 从环境变量读取
    #   permissions: ["*"]  # 全部权限

    # 示例：只读 API Key（仅查询权限）
    # - name: "Read-only Key"
    #   key: "sk_live_your-read-key-here"
    #   permissions:
    #     - "firewall:read"
    #     - "intel:read"
    #     - "geo:read"
    #     - "blocklog:read"

# 阻断日志配置
blocklog:
  enabled: true                    # 是否启用文件持久化
  log_dir: "./logs/blocklog"       # 日志目录（按小时分割，格式：YYYY-MM-DD_HH.jsonl）
  memory_cache_size: 10000         # 内存缓存大小（用于实时查询）
  buffer_size: 1000                # 异步写入缓冲区大小
  flush_interval: 5                # 刷盘间隔（秒）

# WAF 日志监控配置
waf:
  enabled: true                     # 是否启用 WAF 日志监控
  waf_log_path: /caddy-logs/waf_audit.log      # WAF 审计日志路径（Caddy + Coraza）
  rate_limit_log_path: /caddy-logs/rate_limit.log  # Rate Limit 日志路径
  ban_duration: 3600                # 封禁时长（秒，默认1小时）

# 异常流量检测系统配置
anomaly_detection:
  enabled: false                    # 总开关（默认关闭）

  # 采样配置
  sample_rate: 100                  # 采样率 1/N（100 表示 1%）

  # 检测配置
  check_interval: 1                 # 检测间隔（秒）
  min_packets: 100                  # 最小包数（少于此值不检测）
  cleanup_interval: 300             # 清理过期数据间隔（秒）

  # 封禁配置
  block_duration: 60                # 临时封禁时长（秒）

  # 3σ 基线配置
  baseline:
    min_sample_count: 10            # 最小样本数（少于此值不检测）
    sigma_multiplier: 3.0           # σ 倍数（默认 3σ）
    min_threshold: 100              # 最小 PPS 阈值（保护低流量 IP）
    max_age: 1800                   # 基线最大年龄（秒，默认30分钟）

  # 攻击类型封禁配置
  attacks:
    syn_flood:
      enabled: true
      ratio_threshold: 0.5          # SYN 包占比阈值（50%）
      block_duration: 60            # 封禁时长（秒）

    udp_flood:
      enabled: true
      ratio_threshold: 0.8          # UDP 包占比阈值（80%）
      block_duration: 60

    icmp_flood:
      enabled: true
      ratio_threshold: 0.5          # ICMP 包占比阈值（50%）
      block_duration: 60

    ack_flood:
      enabled: true
      ratio_threshold: 0.8          # ACK 包占比阈值（80%）
      block_duration: 60