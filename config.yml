server:
  port: 8080
ebpf:
  interface_name: ens33
intel:
  enabled: true
  persistence_dir: ./data/intel
  batch_size: 1000
  sources:
    ipsum:
      enabled: true
      schedule: "0 1 * * *"  #  每天凌晨 1 点更新
      # url: https://raw.githubusercontent.com/stamparm/ipsum/master/ipsum.txt
      # url: https://raw.gitcode.com/gh_mirrors/ip/ipsum/raw/master/ipsum.txt
      url: http://localhost/ipsum.txt
      format: ipsum
    spamhaus:
      enabled: true
      schedule: "0 2 * * *"  # 每天凌晨 2 点更新
      # url: https://www.spamhaus.org/drop/drop.txt
      url: http://localhost/drop.txt
      format: spamhaus
geo_blocking:
  enabled: true
  mode: whitelist  # whitelist 或 blacklist
  allowed_countries:
    - CN  # 中国
  allow_private_networks: true  # 允许私有网段绕过地域检查
  persistence_dir: ./data/geo
  batch_size: 1000
  sources:
    maxmind:
      enabled: true
      schedule: "0 3 * * *"  # 每天凌晨 3 点更新
      # url: https://github.com/P3TERX/GeoLite.mmdb/releases/download/2026.01.10/GeoLite2-Country.mmdb
      url: http://localhost/GeoLite2-Country.mmdb  # MMDB 文件 URL
      format: maxmind-db  # 使用 MMDB 二进制格式
manual:
  enabled: true          # 启用手动规则持久化
  persistence_dir: ./data/manual  # 持久化目录
  auto_load: true        # 启动时自动加载