server:
  port: 8081

# 日志配置
log:
  level: info           # 日志级别: debug/info/warn/error
  format: console       # 输出格式: console/json
  output_dir: ./logs    # 日志目录
  max_age_days: 30      # 日志保留天数
  rotation_hours: 1     # 按小时分割

ebpf:
  interface_name: ens33
intel:
  enabled: true 
  persistence_dir: ./data/intel
  batch_size: 1000
  sources:
    ipsum:
      enabled: true
      periodic: true               # 是否开启周期性更新（默认 true，设为 false 则仅启动时下载）
      schedule: "0 1 * * *"  #  每天凌晨 1 点更新
      # url: https://raw.githubusercontent.com/stamparm/ipsum/master/ipsum.txt
      # url: https://raw.gitcode.com/gh_mirrors/ip/ipsum/raw/master/ipsum.txt
      url: http://localhost:8008/ipsum.txt
      format: ipsum
    spamhaus:
      enabled: true
      periodic: true               # 是否开启周期性更新（默认 true，设为 false 则仅启动时下载）
      schedule: "0 2 * * *"  # 每天凌晨 2 点更新
      # url: https://www.spamhaus.org/drop/drop.txt
      url: http://localhost:8008/drop.txt
      format: spamhaus
geo_blocking:
  enabled: true 
  mode: whitelist  # whitelist 或 blacklist
  allowed_countries:
    - CN  # 中国
  allow_private_networks: true  # 允许私有网段绕过地域检查
  persistence_dir: ./data/geo
  batch_size: 1000
  sources:
    maxmind:
      enabled: true
      periodic: true               # 是否开启周期性更新（默认 true，设为 false 则仅启动时下载）
      schedule: "0 3 * * *"  # 每天凌晨 3 点更新
      # url: https://github.com/P3TERX/GeoLite.mmdb/releases/download/2026.01.10/GeoLite2-Country.mmdb
      url: http://localhost:8008/GeoLite2-Country.mmdb  # MMDB 文件 URL
      format: maxmind-db  # 使用 MMDB 二进制格式
manual:
  persistence_dir: ./data/manual  # 持久化目录
  auto_load: true        # 启动时自动加载

# 认证配置（强制启用，业务接口必须通过验证）
auth:
  jwt_secret: ""                   # JWT 密钥，建议从环境变量 JWT_SECRET 读取，留空则使用环境变量
  jwt_issuer: "rho-aias"           # JWT 签发者
  token_duration: 1440             # Token 有效期（分钟），默认 1440 分钟（24小时）
  database_path: ./data/auth.db  # 数据库路径
  captcha_enabled: true            # 是否启用验证码
  captcha_duration: 5              # 验证码有效期（分钟）

  # 预定义的 API Key（可选）
  # 留空数组则不创建任何 API Key
  # 建议在生产环境中通过环境变量传入密钥，如：${MASTER_API_KEY}
  api_keys:
    # 超级管理员 API Key（拥有全部权限）
    - name: "Master Admin Key"
      key: "797129746550e02f1bbbf3828534c83d"
      permissions: ["*"]

    # 示例：只读 API Key（仅查询权限）
    # - name: "Read-only Key"
    #   key: "sk_live_your-read-key-here"
    #   permissions:
    #     - "firewall:read"
    #     - "intel:read"
    #     - "geo:read"
    #     - "blocklog:read"

# 业务数据配置
business:
  database_path: ./data/business.db  # 业务数据库路径（封禁记录、情报状态等）

# 阻断日志配置（始终持久化）
blocklog:
  buffer_size: 1000                # 异步写入缓冲区大小
  flush_interval: 5                # 刷盘间隔（秒）
  geo_enrich:
    enabled: true                  # 是否启用 IP 归属地自动补全
    batch_size: 500                # 每批处理记录数

# WAF 日志监控配置
waf:
  enabled: true                     # 是否启用 WAF 日志监控
  waf_log_path: /caddy-logs/waf_audit.log      # WAF 审计日志路径（Caddy + Coraza）
  ban_duration: 60                # 封禁时长（秒，默认1小时）
  offset_state_file: ./data/waf_offset.json    # 偏移量持久化文件路径

# Rate Limit 日志监控配置
rate_limit:
  enabled: true                     # 是否启用 Rate Limit 日志监控
  log_path: /caddy-logs/rate_limit.log  # Rate Limit 日志路径
  ban_duration: 60                # 封禁时长（秒，默认1小时）
  offset_state_file: ./data/ratelimit_offset.json    # 偏移量持久化文件路径

# SSH 防爆破配置（参考 fail2ban 核心功能）
# 日志匹配 + 滑动窗口计数 + 达阈值即封禁
failguard:
  enabled: true                    # 是否启用 SSH 防爆破
  log_path: /var/log/auth.log       # 监控的日志文件路径
  offset_state_file: ./data/failguard_offset.json  # 偏移量持久化文件路径
  # 检测模式：normal=认证失败, ddos=认证失败+preauth异常, aggressive=ddos+协议协商失败
  # normal: 密码错误/无效用户/PAM失败等（参考 fail2ban normal 模式）
  # ddos: normal + 未发送识别字符串/认证超时/preauth断连等（参考 fail2ban ddos 模式）
  # aggressive: ddos + 协议版本错误/密钥协商失败/banner异常等（参考 fail2ban aggressive 模式）
  mode: aggressive                      # 检测模式（默认 normal）
  # fail_regex 和 ignore_regex 留空则使用内置默认值（参考 fail2ban filter.d/sshd.conf）
  # fail_regex:                       # 自定义失败匹配正则（留空则按 mode 使用内置规则）
  #   - "Failed \\w+ for (?:invalid user )?(\\S+) from <HOST> port \\d+ ssh2"
  # ignore_regex:                     # 自定义忽略匹配正则（留空使用内置默认）
  #   - "Accepted \\w+ for .* from <HOST>"
  ignore_ips:                       # 白名单 IP/CIDR（永不封禁）
    # - "10.0.0.0/8"
  max_retry: 5                      # 触发封禁的失败次数阈值
  find_time: 600                    # 滑动窗口时长（秒，默认10分钟）
  ban_duration: 60                # 封禁时长（秒，默认1小时）

# 异常流量检测系统配置
# 检测流程：每个 check_interval 对每个 IP 依次执行：
#   1. 攻击类型检测（协议比例分析）→ 未命中则进入
#   2. IQR 基线检测（PPS 异常检测，兜底捕获 HTTP Flood 等）
# 每个攻击类型有两道门：全局 min_packets + 类型专属 min_packets，全过才进入比例判断
anomaly_detection:
  enabled: true                    # 总开关

  # 采样配置
  sample_rate: 1                    # 采样率 1/N（1 = 100% 采样，eBPF 开销极小）

  # 检测配置
  check_interval: 1                 # 检测间隔（秒），代码基于秒窗口设计，不建议修改
  min_packets: 200                  # 全局最小包数门槛：单 IP 每秒 <200 包直接跳过攻击检测
  cleanup_interval: 300             # 清理不活跃 IP 统计的间隔（秒）

  # 端口过滤配置（仅对指定端口进行异常检测，同时应用于 TCP/UDP，为空则检测所有端口）
  ports:
    - 80
    - 443
    - 8080
    - 8443
    - 53
    - 22

  # IQR 基线配置（兜底检测：协议比例正常但流量异常大的场景，如 HTTP Flood）
  # 基于 PPS 历史数据计算四分位距，阈值 = Q3 + k × IQR
  baseline:
    min_sample_count: 60            # 最小学习样本数（60 秒），不足时仅学习不检测
    iqr_multiplier: 2.5             # IQR 倍数，Q3 + 2.5×IQR，对偏态分布更鲁棒
    min_threshold: 1000             # 最小 PPS 阈值，PPS <1000 的 IP 豁免基线检测
    max_age: 3600                   # 基线最大有效期（秒），过期自动重置以适应流量变化
    block_duration: 60              # 基线异常封禁时长（秒）

  # 攻击类型封禁配置
  # 封禁条件 = 全局 min_packets 通过 + 类型 min_packets 通过 + ratio_threshold 通过
  attacks:
    # SYN Flood：大量 SYN 不完成握手，正常 TCP 握手后 SYN 占比 <5%
    # 误触风险：低
    syn_flood:
      enabled: true
      ratio_threshold: 0.5          # SYN/TCP > 50% 才触发（正常流量远低于此值）
      min_packets: 200              # TCP 包 ≥200 才检测
      block_duration: 60

    # UDP Flood：大量 UDP 包洪泛，Web 服务以 TCP 为主，正常 UDP 占比 <10%
    # 误触风险：低
    udp_flood:
      enabled: true
      ratio_threshold: 0.8          # UDP/总包 > 80% 才触发
      min_packets: 200              # UDP 包 ≥200 才检测
      block_duration: 60

    # ICMP Flood：大量 ICMP 包，正常流量 ICMP 极少（仅偶尔 ping）
    # 误触风险：低
    icmp_flood:
      enabled: true
      ratio_threshold: 0.5          # ICMP/总包 > 50% 才触发（ICMP Flood 特征明显）
      min_packets: 50               # ICMP 包 ≥50 才检测（特征明显，可适当放宽）
      block_duration: 60

    # ACK Flood：大量纯 ACK 包，⚠️ 误触风险最高
    # 正常 HTTP 下载 ACK 占比可达 70-85%，需提高门槛避免误封
    ack_flood:
      enabled: true
      ratio_threshold: 0.95          # ACK/TCP > 90% 才触发（正常下载通常 <85%）
      min_packets: 500              # TCP 包 ≥500 才检测（主要误触来源，必须抬高）
      block_duration: 60
