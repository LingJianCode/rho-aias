services:
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-logs:/logs

  rho-aias:
    build: .
    container_name: rho-aias
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - CAP_BPF
      - CAP_PERFMON
      - CAP_NET_ADMIN
      - CAP_NET_RAW
    network_mode: host
    volumes:
      - ./config.yml:/app/config/config.yml:ro
      - rho-aias-logs:/app/logs
      - ./data:/app/data
      - caddy-logs:/caddy-logs:ro
    command: ["--config", "/app/config/config.yml"]
    restart: unless-stopped

volumes:
  caddy-logs:
  rho-aias-logs:
