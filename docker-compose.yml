services:
  caddy:
    image: docker.cnb.cool/makecnbgreatagain/rho-aias/rho-aias-caddy:latest
    container_name: caddy
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    network_mode: host
    user: root

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true


    tmpfs:
      - /tmp

    volumes:
      - ./caddy:/etc/caddy:ro
      - ./caddy_run/.config:/root/.config
      - ./caddy_run/data:/root/.local/share/caddy
      - ./logs/caddy:/logs

  rho-aias:
    image: docker.cnb.cool/makecnbgreatagain/rho-aias/rho-aias:latest
    container_name: rho-aias
    environment:
      - TZ=Asia/Shanghai
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - CAP_BPF
      - CAP_PERFMON
      - CAP_NET_ADMIN
      - CAP_NET_RAW
    network_mode: host
    volumes:
      - ./config:/app/config:ro
      # 必须要挂载目录，否则inotify无法监听文件变化
      - ./logs/rho-aias:/app/logs
      - ./data:/app/data
      - ./logs/caddy:/caddy-logs:ro
      # 必须要挂载目录，否则inotify无法监听文件变化
      - /var/log:/var/log:ro
    command: ["--config", "/app/config/config.yml"]
    restart: unless-stopped

